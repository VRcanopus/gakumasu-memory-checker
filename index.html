<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>コンテストメモリー 振り分け最適化チェッカー</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    // ── 定数 ───────────────────────────────────────────
    const RARITIES = [
      { id: "support",     label: "サポカ",  sublabel: "SR・SSR共通",  base: 96,  enh: 126 },
      { id: "ssr",         label: "虹",      sublabel: "SSR",           base: 150, enh: 204 },
      { id: "high_gold",   label: "高金",    sublabel: "Plv3以上 SR",  base: 105, enh: 141 },
      { id: "low_gold",    label: "低金",    sublabel: "Plv2以下 SR",  base: 75,  enh: 102 },
      { id: "high_silver", label: "高銀",    sublabel: "Plv3以上 R",   base: 45,  enh: 60  },
      { id: "low_silver",  label: "低銀",    sublabel: "Plv2以下 R",   base: 30,  enh: 39  },
    ];
    const RANKS = [
      { id: "B",   label: "B",   min: 306, max: 363 },
      { id: "B+",  label: "B+",  min: 306, max: 423 },
      { id: "A",   label: "A",   min: 441, max: 519 },
      { id: "A+",  label: "A+",  min: 441, max: 594 },
      { id: "S",   label: "S",   min: 546, max: 642 },
      { id: "S+",  label: "S+",  min: 546, max: 741 },
      { id: "SS",  label: "SS",  min: 651, max: 804 },
      { id: "SS+", label: "SS+", min: 651, max: 858 },
      { id: "SSS", label: "SSS", min: 546, max: 858, note: "観測値" },
    ];

    // 自由枠の候補：サポカ除く全レアリティ、強化+ を先に
    const FREE_OPTIONS = RARITIES
      .filter((r) => r.id !== "support")
      .flatMap((r) => [
        { rarityId: r.id, label: r.label, enhanced: true,  cost: r.enh  },
        { rarityId: r.id, label: r.label, enhanced: false, cost: r.base },
      ]);

    const MAX_SETS = 5;
    const DIST_CAP  = 3000; // 探索上限
    const RESULT_PREVIEW = 10;

    const getRarity = (id) => RARITIES.find((r) => r.id === id);
    const getCost   = (rarityId, enhanced) => {
      const r = getRarity(rarityId);
      return r ? (enhanced ? r.enh : r.base) : 0;
    };

    const rarityColor = {
      low_silver:  { solid: "#9ca3af", border: "#6b7280" },
      high_silver: { solid: "#94a3b8", border: "#64748b" },
      low_gold:    { solid: "#d97706", border: "#b45309" },
      high_gold:   { solid: "#f59e0b", border: "#d97706" },
      ssr:         { solid: "#a855f7", border: "#a855f7" },
      support:     { solid: "#06b6d4", border: "#06b6d4" },
    };

    // ── 重複組み合わせ生成 ─────────────────────────────
    function getCombosWithRepeat(options, n) {
      const results = [];
      function rec(start, cur) {
        if (cur.length === n) { results.push([...cur]); return; }
        for (let i = start; i < options.length; i++) {
          cur.push(options[i]);
          rec(i, cur);
          cur.pop();
        }
      }
      rec(0, []);
      return results;
    }

    // ── 自由枠コンボキャッシュ ────────────────────────
    const _validCache = new Map();
    function getValidFreeCombos(rank, freeCount, fixedCost) {
      if (freeCount < 0) return [];
      const key = `${rank.id}|${freeCount}|${fixedCost}`;
      if (_validCache.has(key)) return _validCache.get(key);
      const combos = freeCount === 0
        ? (fixedCost >= rank.min && fixedCost <= rank.max ? [[]] : [])
        : getCombosWithRepeat(FREE_OPTIONS, freeCount).filter((combo) => {
            const total = fixedCost + combo.reduce((s, c) => s + c.cost, 0);
            return total >= rank.min && total <= rank.max;
          });
      _validCache.set(key, combos);
      return combos;
    }

    // ── 取り放題計算 ──────────────────────────────────
    function computeSafeCards(allCosts, total, rank) {
      return FREE_OPTIONS.filter((opt) => {
        for (const c of allCosts) {
          const newTotal = total - c + opt.cost;
          if (newTotal >= rank.min && newTotal <= rank.max) return false;
        }
        return true;
      });
    }

    // ── 1セット評価（全有効コンボを返す）────────────────
    function evaluateSet(fixedCards, rank) {
      const fixedCosts = fixedCards.map((c) => c.cost);
      const fixedCost  = fixedCosts.reduce((s, c) => s + c, 0);
      const freeCount  = 5 - fixedCards.length;

      const validCombos = getValidFreeCombos(rank, freeCount, fixedCost);
      if (validCombos.length === 0) return { valid: false, combos: [] };

      const combos = validCombos.map((freeCombo) => {
        const freeCosts = freeCombo.map((c) => c.cost);
        const allCosts  = [...fixedCosts, ...freeCosts];
        const total     = fixedCost + freeCosts.reduce((s, c) => s + c, 0);
        const safeCards = computeSafeCards(allCosts, total, rank);
        const lowGoldCount = fixedCards.filter((c) => c.rarityId === "low_gold").length
                          + freeCombo.filter((c) => c.rarityId === "low_gold").length;
        return { freeCombo, total, safeCards, hasSafe: safeCards.length > 0, grayed: lowGoldCount > 1 };
      }).sort((a, b) => {
        const as = a.hasSafe ? 1 : 0;
        const bs = b.hasSafe ? 1 : 0;
        if (bs !== as) return bs - as;
        return b.total - a.total;
      });

      const hasSafe = combos[0]?.hasSafe ?? false;
      const best    = combos[0] ?? null;
      return { valid: true, hasSafe, best, combos };
    }

    // ── 分配パターン生成 ──────────────────────────────
    // poolCards: [{rarityId, enhanced, cost, count}, ...]
    // 戻り値: { distributions: 分配パターン配列, capped: 上限到達フラグ }
    function generateDistributions(poolCards, numSets, cap) {
      const results = [];
      let capped = false;

      function rec(cardIdx, dist) {
        if (capped) return;
        if (cardIdx === poolCards.length) {
          if (results.length >= cap) {
            capped = true;
            return;
          }
          results.push(dist.map((s) => [...s]));
          return;
        }
        const card = poolCards[cardIdx];
        const obj  = { rarityId: card.rarityId, enhanced: card.enhanced, cost: card.cost };
        const isSupport = card.rarityId === "support";

        function distCard(remaining, setIdx, d) {
          if (capped) return;
          if (setIdx === numSets) {
            if (remaining === 0) rec(cardIdx + 1, d);
            return;
          }
          const slotsLeft   = 5 - d[setIdx].length;
          const supportFull = isSupport && d[setIdx].some((c) => c.rarityId === "support");
          const maxTake     = supportFull ? 0 : Math.min(remaining, slotsLeft, isSupport ? 1 : Infinity);

          for (let take = 0; take <= maxTake; take++) {
            const newSet = [...d[setIdx], ...Array(take).fill(obj)];
            distCard(remaining - take, setIdx + 1, d.map((s, i) => i === setIdx ? newSet : s));
            if (capped) return;
          }
        }

        distCard(card.count, 0, dist);
      }

      rec(0, Array.from({ length: numSets }, () => []));
      return { distributions: results, capped };
    }

    // ── セット入れ替わり重複の除去 ────────────────────
    function deduplicateDistributions(distributions, sets) {
      const seen = new Set();
      return distributions.filter((dist) => {
        const setKeys = dist.map((fixedCards, i) => {
          const rankId = sets[i].rankId;
          const cardsKey = [...fixedCards]
            .sort((a, b) => {
              const ka = a.rarityId + a.enhanced;
              const kb = b.rarityId + b.enhanced;
              return ka < kb ? -1 : ka > kb ? 1 : 0;
            })
            .map((c) => `${c.rarityId}${c.enhanced ? "+" : "-"}`)
            .join(",");
          return `${rankId}:${cardsKey}`;
        });
        const key = [...setKeys].sort().join("|");
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function CardBadge({ rarityId, enhanced, cost, dim, small }) {
      const col = rarityColor[rarityId] || { solid: "#6b7280", border: "#4b5563" };
      return (
        <span style={{
          display: "inline-flex", alignItems: "center", gap: 3,
          padding: small ? "2px 7px" : "3px 9px",
          borderRadius: 14, fontSize: small ? 11 : 12, whiteSpace: "nowrap",
          background: "rgba(0,0,0,0.3)", border: `1px solid ${col.border}60`,
          opacity: dim ? 0.4 : 1,
        }}>
          <span style={{ width: 6, height: 6, borderRadius: "50%", background: col.solid, flexShrink: 0, display: "inline-block" }} />
          <span style={{ color: "#d0c0f0" }}>{getRarity(rarityId)?.label ?? rarityId}{enhanced ? "+" : "−"}</span>
          {cost !== undefined && <span style={{ color: "#605080", fontSize: 10 }}>{cost}</span>}
        </span>
      );
    }

    function comboKey(combo) {
      return combo.freeCombo.map((c) => `${c.rarityId}${c.enhanced ? "+" : "-"}`).join(",");
    }

    function SetResultRow({ fixedCards, evalResult, rank, label }) {
      const [expandedKey, setExpandedKey] = useState(null);
      const [showAllCombos, setShowAllCombos] = useState(false);
      const COMBO_PREVIEW = 15;

      if (!evalResult.valid) {
        return (
          <div style={{ padding: "10px 14px", borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
            <div style={{ fontSize: 12, color: "#f87171" }}>
              ⚠️ セット{label}（{rank.label}）: コスト範囲内の組み合わせなし
            </div>
          </div>
        );
      }

      const { combos, hasSafe } = evalResult;
      const displayed = showAllCombos ? combos : combos.slice(0, COMBO_PREVIEW);

      return (
        <div style={{ borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
          <div style={{
            display: "flex", alignItems: "center", gap: 8, padding: "8px 14px",
            background: hasSafe ? "rgba(52,211,153,0.04)" : "rgba(255,255,255,0.02)",
          }}>
            <div style={{
              width: 22, height: 22, borderRadius: 6, flexShrink: 0,
              background: hasSafe ? "rgba(52,211,153,0.2)" : "rgba(100,100,100,0.15)",
              border: `1px solid ${hasSafe ? "rgba(52,211,153,0.4)" : "rgba(255,255,255,0.1)"}`,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 11, fontWeight: 700, color: hasSafe ? "#34d399" : "#7060a0",
            }}>{label}</div>
            <span style={{ fontSize: 12, color: "#a090c0", fontWeight: 700 }}>{rank.label}</span>
            <span style={{ fontSize: 11, color: "#504060" }}>{rank.min}〜{rank.max}</span>
            {fixedCards.length > 0 && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>
                {fixedCards.map((c, i) => <CardBadge key={i} rarityId={c.rarityId} enhanced={c.enhanced} cost={c.cost} small />)}
              </div>
            )}
            <span style={{ fontSize: 11, color: "#6060a0", marginLeft: "auto" }}>
              {combos.length}件
            </span>
          </div>

          <div style={{
            display: "flex", alignItems: "center", gap: 8, padding: "5px 14px",
            fontSize: 10, color: "#403050",
            borderBottom: "1px solid rgba(255,255,255,0.03)",
          }}>
            <div style={{ width: 18, textAlign: "right", flexShrink: 0 }}>#</div>
            <div style={{ flex: 1, minWidth: 0 }}>自由枠の構成</div>
            <div style={{ width: 64, textAlign: "center", flexShrink: 0 }}>取り放題</div>
            <div style={{ width: 44, textAlign: "right", flexShrink: 0 }}>合計</div>
            <div style={{ width: 14, flexShrink: 0 }} />
          </div>

          <div style={{ maxHeight: 280, overflowY: "auto", overflowX: "hidden" }}>
            {displayed.map((combo, idx) => {
              const key = comboKey(combo);
              const isExp = expandedKey === key;
              return (
                <div key={key} style={{
                  borderBottom: "1px solid rgba(255,255,255,0.025)",
                  opacity: combo.grayed ? 0.35 : 1,
                  background: isExp ? "rgba(168,85,247,0.07)"
                    : idx % 2 === 0 ? "transparent" : "rgba(255,255,255,0.01)",
                }}>
                  <div onClick={() => setExpandedKey(isExp ? null : key)} style={{
                    display: "flex", alignItems: "center", gap: 8,
                    padding: "7px 14px", cursor: "pointer",
                    width: "100%", overflow: "hidden",
                  }}>
                    <div style={{ width: 18, fontSize: 10, color: "#504070", flexShrink: 0, textAlign: "right" }}>{idx + 1}</div>
                    <div style={{ flex: 1, minWidth: 0, display: "flex", flexWrap: "wrap", gap: 3 }}>
                      {combo.freeCombo.length > 0
                        ? combo.freeCombo.map((c, ci) => <CardBadge key={ci} rarityId={c.rarityId} enhanced={c.enhanced} cost={c.cost} small />)
                        : <span style={{ fontSize: 11, color: "#403050" }}>（自由枠なし）</span>}
                    </div>
                    <div style={{
                      flexShrink: 0, width: 64,
                      visibility: combo.hasSafe ? "visible" : "hidden",
                      background: "rgba(52,211,153,0.15)", border: "1px solid rgba(52,211,153,0.35)",
                      borderRadius: 8, padding: "1px 4px",
                      fontSize: 9, color: "#34d399", textAlign: "center", whiteSpace: "nowrap",
                    }}>取り放題あり</div>
                    <div style={{ width: 44, flexShrink: 0, textAlign: "right", fontSize: 12, fontWeight: 700, color: "#c0a0ff" }}>
                      {combo.total}
                    </div>
                    <div style={{ width: 14, flexShrink: 0, fontSize: 10, color: "#604080", textAlign: "center" }}>
                      {isExp ? "▲" : "▼"}
                    </div>
                  </div>
                  {isExp && (
                    <div style={{
                      margin: "0 12px 8px", borderRadius: 8, padding: "8px 12px",
                      border: combo.hasSafe ? "1px solid rgba(52,211,153,0.2)" : "1px solid rgba(255,255,255,0.05)",
                      background: combo.hasSafe ? "rgba(52,211,153,0.04)" : "rgba(255,255,255,0.02)",
                    }}>
                      <div style={{ fontSize: 10, fontWeight: 700, marginBottom: 5,
                        color: combo.hasSafe ? "#34d399" : "#604070" }}>
                        {combo.hasSafe ? "✅ 取り放題カード" : "⚠️ 取り放題なし"}
                      </div>
                      {combo.hasSafe && (
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>
                          {combo.safeCards.map((c, i) => <CardBadge key={i} rarityId={c.rarityId} enhanced={c.enhanced} cost={c.cost} small />)}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {combos.length > COMBO_PREVIEW && (
            <div style={{ padding: "7px", textAlign: "center", borderTop: "1px solid rgba(255,255,255,0.03)" }}>
              <button onClick={() => setShowAllCombos(!showAllCombos)} style={{
                padding: "4px 16px", borderRadius: 16,
                border: "1px solid rgba(168,85,247,0.35)",
                background: "rgba(168,85,247,0.08)", color: "#c084fc", fontSize: 11,
              }}>
                {showAllCombos ? "▲ 折りたたむ" : `▼ 残り ${combos.length - COMBO_PREVIEW} 件`}
              </button>
            </div>
          )}
        </div>
      );
    }

    function MemoryChecker() {
      const [pool, setPool] = useState([
        { id: 1, rarityId: "ssr",       enhanced: true,  count: 2 },
        { id: 2, rarityId: "high_gold", enhanced: false, count: 1 },
      ]);
      const [poolNext, setPoolNext] = useState(3);

      const [sets, setSets] = useState([
        { id: 1, rankId: "SS" },
        { id: 2, rankId: "SS" },
      ]);
      const [setsNext, setSetsNext] = useState(3);
      const [openResultIdx, setOpenResultIdx] = useState(null);
      const [showAll, setShowAll] = useState(false);

      const addPool = () => {
        setPool((p) => [...p, { id: poolNext, rarityId: "low_silver", enhanced: false, count: 1 }]);
        setPoolNext((n) => n + 1);
      };
      const removePool = (id) => setPool((p) => p.filter((c) => c.id !== id));
      const updatePool = (id, u) => setPool((p) => p.map((c) => c.id === id ? { ...c, ...u } : c));

      const addSet = () => {
        if (sets.length >= MAX_SETS) return;
        setSets((s) => [...s, { id: setsNext, rankId: "SS" }]);
        setSetsNext((n) => n + 1);
      };
      const removeSet = (id) => setSets((s) => s.filter((x) => x.id !== id));
      const updateSet = (id, u) => setSets((s) => s.map((x) => x.id === id ? { ...x, ...u } : x));

      const totalSpecified = pool.reduce((s, p) => s + p.count, 0);
      const totalSlots     = sets.length * 5;
      const totalFree      = totalSlots - totalSpecified;
      const isInvalid      = totalSpecified > totalSlots;

      const searchResult = useMemo(() => {
        if (isInvalid || pool.length === 0 || sets.length === 0) return null;
        _validCache.clear();

        const poolCards = pool.map((p) => ({
          rarityId: p.rarityId,
          enhanced: p.enhanced,
          cost: getCost(p.rarityId, p.enhanced),
          count: p.count,
        }));

        const generated = generateDistributions(poolCards, sets.length, DIST_CAP);
        const distributions = deduplicateDistributions(
          generated.distributions,
          sets
        );
        const capped = generated.capped;

        const ranked = distributions.map((dist) => {
          const setEvals = sets.map((set, i) => {
            const rank = RANKS.find((r) => r.id === set.rankId);
            const fixedCards = dist[i];
            const evalResult = evaluateSet(fixedCards, rank);
            return { fixedCards, evalResult, rank, set };
          });
          const safeCount = setEvals.filter((e) => e.evalResult.hasSafe).length;
          const validCount = setEvals.filter((e) => e.evalResult.valid).length;
          return { dist, setEvals, safeCount, validCount };
        });

        ranked.sort((a, b) => b.safeCount - a.safeCount || b.validCount - a.validCount);

        return { results: ranked, capped, total: distributions.length };
      }, [pool, sets, isInvalid]);

      const displayed = showAll
        ? searchResult?.results
        : searchResult?.results.slice(0, RESULT_PREVIEW);

      return (
        <div style={{
          minHeight: "100vh",
          background: "linear-gradient(160deg, #0f0a1e 0%, #1a0a2e 50%, #0a1428 100%)",
          fontFamily: "'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif",
          color: "#f0e8ff", padding: "20px 14px",
        }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
            html, body, #root {
              margin: 0;
              padding: 0;
              min-height: 100%;
              background: #0f0a1e;
            }
            * { box-sizing: border-box; }
            button, select { cursor: pointer; }
            ::-webkit-scrollbar { width: 4px; }
            ::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); }
            ::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.4); border-radius: 2px; }
          `}</style>

          <div style={{ textAlign: "center", marginBottom: 22 }}>
            <div style={{ fontSize: 10, letterSpacing: 4, color: "#a855f7", marginBottom: 4 }}>学マス</div>
            <h1 style={{ fontSize: 20, fontWeight: 700, margin: 0, color: "#fff", textShadow: "0 0 20px rgba(168,85,247,0.6)" }}>
              コンテストメモリー<br />振り分け最適化チェッカー
            </h1>
            <p style={{ fontSize: 11, color: "#9080b0", marginTop: 6 }}>
              指定カードをセット間で振り分け、取り放題セットを最大化
            </p>
          </div>

          <div style={{ maxWidth: 680, margin: "0 auto" }}>
            <Section label="① 指定カード（セット間で分配する枚数を指定）">
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {pool.map((p) => {
                  const col = rarityColor[p.rarityId] || { solid: "#6b7280" };
                  return (
                    <div key={p.id} style={{
                      display: "flex", alignItems: "center", gap: 8,
                      background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)",
                      borderRadius: 10, padding: "8px 12px",
                    }}>
                      <div style={{ width: 9, height: 9, borderRadius: "50%", flexShrink: 0, background: col.solid }} />
                      <select value={p.rarityId}
                        onChange={(e) => updatePool(p.id, { rarityId: e.target.value })}
                        style={{
                          flex: 1, minWidth: 0, background: "rgba(0,0,0,0.4)", color: "#f0e8ff",
                          border: "1px solid rgba(255,255,255,0.12)", borderRadius: 7,
                          padding: "4px 6px", fontSize: 12,
                        }}>
                        {RARITIES.map((r) => (
                          <option key={r.id} value={r.id}>{r.label}（{r.sublabel}）</option>
                        ))}
                      </select>
                      <button onClick={() => updatePool(p.id, { enhanced: !p.enhanced })}
                        style={{
                          padding: "4px 10px", borderRadius: 7, flexShrink: 0, fontSize: 12,
                          border: p.enhanced ? "1px solid #f59e0b" : "1px solid rgba(255,255,255,0.12)",
                          background: p.enhanced ? "rgba(245,158,11,0.2)" : "rgba(255,255,255,0.04)",
                          color: p.enhanced ? "#f59e0b" : "#6060a0", fontWeight: p.enhanced ? 700 : 400,
                        }}>{p.enhanced ? "+" : "−"}</button>
                      <div style={{ display: "flex", alignItems: "center", gap: 4, flexShrink: 0 }}>
                        <button onClick={() => updatePool(p.id, { count: Math.max(1, p.count - 1) })}
                          style={{ width: 22, height: 22, borderRadius: 6, border: "1px solid rgba(255,255,255,0.12)",
                            background: "rgba(255,255,255,0.04)", color: "#9080b0", fontSize: 14 }}>−</button>
                        <div style={{ width: 20, textAlign: "center", fontSize: 13, fontWeight: 700, color: "#c0a0ff" }}>
                          {p.count}
                        </div>
                        <button onClick={() => updatePool(p.id, { count: Math.min(sets.length * 5, p.count + 1) })}
                          style={{ width: 22, height: 22, borderRadius: 6, border: "1px solid rgba(255,255,255,0.12)",
                            background: "rgba(255,255,255,0.04)", color: "#9080b0", fontSize: 14 }}>＋</button>
                      </div>
                      <div style={{ width: 32, textAlign: "right", fontSize: 11, color: "#7060a0", flexShrink: 0 }}>
                        {getCost(p.rarityId, p.enhanced)}
                      </div>
                      <button onClick={() => removePool(p.id)} style={{
                        width: 22, height: 22, borderRadius: "50%", flexShrink: 0,
                        border: "1px solid rgba(255,80,80,0.3)", background: "rgba(255,80,80,0.08)",
                        color: "#ff6060", fontSize: 13, display: "flex", alignItems: "center", justifyContent: "center",
                      }}>×</button>
                    </div>
                  );
                })}
              </div>
              <button onClick={addPool} style={{
                marginTop: 8, width: "100%", padding: "8px",
                border: "2px dashed rgba(168,85,247,0.3)", borderRadius: 10,
                background: "transparent", color: "#8060c0", fontSize: 12,
              }}>＋ カードを追加</button>

              <div style={{
                marginTop: 10, display: "flex", gap: 14, flexWrap: "wrap",
                fontSize: 12, padding: "8px 12px",
                background: "rgba(255,255,255,0.03)", borderRadius: 8,
              }}>
                <span>指定合計：<strong style={{ color: "#c0a0ff" }}>{totalSpecified}</strong>枚</span>
                <span>全スロット：<strong style={{ color: "#c0a0ff" }}>{totalSlots}</strong>枠</span>
                <span style={{ color: isInvalid ? "#f87171" : totalFree === 0 ? "#f59e0b" : "#34d399", fontWeight: 700 }}>
                  自由枠：{isInvalid ? "超過！" : totalFree}
                  {!isInvalid && "枠"}
                </span>
              </div>
              {isInvalid && (
                <div style={{ marginTop: 6, fontSize: 12, color: "#f87171", padding: "6px 10px",
                  background: "rgba(248,113,113,0.08)", borderRadius: 8, border: "1px solid rgba(248,113,113,0.2)" }}>
                  ⚠️ 指定カードの合計（{totalSpecified}枚）がセット数×5（{totalSlots}枠）を超えています
                </div>
              )}
            </Section>

            <Section label={`② セット設定（${sets.length} / ${MAX_SETS}）`}>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {sets.map((set, i) => (
                  <div key={set.id} style={{
                    display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap",
                    background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)",
                    borderRadius: 10, padding: "10px 12px",
                  }}>
                    <div style={{
                      width: 22, height: 22, borderRadius: 6, flexShrink: 0,
                      background: "rgba(168,85,247,0.2)", border: "1px solid rgba(168,85,247,0.35)",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 11, fontWeight: 700, color: "#c084fc",
                    }}>{i + 1}</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 4, flex: 1 }}>
                      {RANKS.map((r) => (
                        <button key={r.id} onClick={() => updateSet(set.id, { rankId: r.id })}
                          style={{
                            padding: "4px 10px", borderRadius: 16, fontSize: 11,
                            border: set.rankId === r.id ? "2px solid #a855f7" : "2px solid rgba(255,255,255,0.1)",
                            background: set.rankId === r.id ? "rgba(168,85,247,0.25)" : "rgba(255,255,255,0.04)",
                            color: set.rankId === r.id ? "#e0b0ff" : "#9080b0",
                            fontWeight: set.rankId === r.id ? 700 : 400,
                          }}>
                          {r.label}{r.note ? <span style={{ fontSize: 8, opacity: 0.6 }}>*</span> : null}
                        </button>
                      ))}
                    </div>
                    {sets.length > 1 && (
                      <button onClick={() => removeSet(set.id)} style={{
                        width: 22, height: 22, borderRadius: "50%", flexShrink: 0,
                        border: "1px solid rgba(255,80,80,0.3)", background: "rgba(255,80,80,0.08)",
                        color: "#ff6060", fontSize: 13, display: "flex", alignItems: "center", justifyContent: "center",
                      }}>×</button>
                    )}
                  </div>
                ))}
              </div>
              {sets.length < MAX_SETS && (
                <button onClick={addSet} style={{
                  marginTop: 8, width: "100%", padding: "8px",
                  border: "2px dashed rgba(168,85,247,0.3)", borderRadius: 10,
                  background: "transparent", color: "#8060c0", fontSize: 12,
                }}>＋ セットを追加</button>
              )}
            </Section>

            {!isInvalid && searchResult && (
              <Section label="③ 振り分けパターン（取り放題セット数 降順）">
                {searchResult.capped && (
                  <div style={{ marginBottom: 8, fontSize: 11, color: "#f59e0b", padding: "6px 10px",
                    background: "rgba(245,158,11,0.08)", borderRadius: 8, border: "1px solid rgba(245,158,11,0.2)" }}>
                    ⚠️ 分配パターンが多いため上限{DIST_CAP}件で打ち切り（参考値）
                  </div>
                )}
                <div style={{ fontSize: 11, color: "#6060a0", marginBottom: 10 }}>
                  探索した分配パターン：{searchResult.total}件
                  　濃いカードバッジ＝指定カード、薄いカードバッジ＝自由枠の推奨
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {displayed?.map((result, ri) => {
                    const isOpen = openResultIdx === ri;
                    return (
                      <div key={ri} style={{
                        background: "rgba(255,255,255,0.03)",
                        border: `1px solid ${result.safeCount === sets.length ? "rgba(52,211,153,0.3)" : result.safeCount > 0 ? "rgba(168,85,247,0.2)" : "rgba(255,255,255,0.06)"}`,
                        borderRadius: 12, overflow: "hidden",
                      }}>
                        <div onClick={() => setOpenResultIdx(isOpen ? null : ri)}
                          style={{
                            display: "flex", alignItems: "center", gap: 10, padding: "12px 16px",
                            cursor: "pointer", background: result.safeCount === sets.length
                              ? "rgba(52,211,153,0.05)" : "rgba(168,85,247,0.03)",
                          }}>
                          <div style={{ fontSize: 11, color: "#504060", flexShrink: 0, width: 22, textAlign: "right" }}>
                            {ri + 1}
                          </div>
                          <div style={{ flexShrink: 0 }}>
                            <div style={{ fontSize: 18, fontWeight: 700,
                              color: result.safeCount === sets.length ? "#34d399" : result.safeCount > 0 ? "#f59e0b" : "#7060a0" }}>
                              {result.safeCount}<span style={{ fontSize: 11, color: "#6060a0", fontWeight: 400 }}>/ {sets.length}</span>
                            </div>
                            <div style={{ fontSize: 9, color: "#6060a0" }}>取り放題</div>
                          </div>
                          <div style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column", gap: 4 }}>
                            {result.setEvals.map((ev, si) => (
                              <div key={si} style={{ display: "flex", alignItems: "flex-start", gap: 6 }}>
                                <span style={{
                                  fontSize: 10, color: ev.evalResult.hasSafe ? "#34d399" : "#7060a0",
                                  flexShrink: 0, width: 10, paddingTop: 2,
                                }}>{ev.evalResult.hasSafe ? "✓" : "·"}</span>
                                <div style={{ flex: 1, minWidth: 0, display: "flex", flexWrap: "wrap", gap: 3 }}>
                                  {ev.fixedCards.length > 0
                                    ? ev.fixedCards.map((c, ci) => (
                                        <CardBadge key={ci} rarityId={c.rarityId} enhanced={c.enhanced} small />
                                      ))
                                    : <span style={{ fontSize: 10, color: "#403050" }}>（全枠自由）</span>
                                  }
                                </div>
                                <span style={{ fontSize: 10, color: "#7060a0", flexShrink: 0, paddingTop: 2 }}>
                                  {ev.evalResult.best?.total ?? "−"}
                                </span>
                              </div>
                            ))}
                          </div>
                          <div style={{ flexShrink: 0, fontSize: 12, color: "#604080" }}>
                            {isOpen ? "▲" : "▼"}
                          </div>
                        </div>

                        {isOpen && (
                          <div style={{ borderTop: "1px solid rgba(255,255,255,0.05)" }}>
                            {result.setEvals.map((ev, si) => (
                              <SetResultRow
                                key={si}
                                label={si + 1}
                                fixedCards={ev.fixedCards}
                                evalResult={ev.evalResult}
                                rank={ev.rank}
                              />
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {(searchResult?.results?.length ?? 0) > RESULT_PREVIEW && (
                  <div style={{ marginTop: 10, textAlign: "center" }}>
                    <button onClick={() => setShowAll(!showAll)} style={{
                      padding: "7px 22px", borderRadius: 20,
                      border: "1px solid rgba(168,85,247,0.4)",
                      background: "rgba(168,85,247,0.1)", color: "#c084fc", fontSize: 12,
                    }}>
                      {showAll ? "▲ 折りたたむ" : `▼ 残り ${searchResult.results.length - RESULT_PREVIEW} パターンを表示`}
                    </button>
                  </div>
                )}
              </Section>
            )}

            <div style={{ textAlign: "center", fontSize: 10, color: "#40305a", marginTop: 20, paddingBottom: 16 }}>
              ※ SSS上限・下限は観測値。自由枠はサポカ除く全レアリティから選択。
            </div>
          </div>
        </div>
      );
    }

    function Section({ label, children }) {
      return (
        <div style={{ marginBottom: 18 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#8060c0", letterSpacing: 1, marginBottom: 8 }}>
            {label}
          </div>
          {children}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<MemoryChecker />);
  </script>
</body>
</html>
